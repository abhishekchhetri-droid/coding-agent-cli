# Langflow now runs from source (nokia/langflow) for code-level frontend edits.
# Only Redis remains containerized (optional entity cache for coding-agent).
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis_data:
